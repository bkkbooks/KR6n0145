body:
  text: 蕅益智旭略解西方釋名有其六種一依主二持業三有財四相違五帶數六鄰近以此六種有離合故一一具二若單一字名即非六釋以不得成離合相故已上總標已下別釋即為六也初依主者謂所依為主如説眼識識依眼起即眼之識故名眼識舉眼之主以表於識也亦名依士釋此即分取他名如眼識亦名為色識耳識亦名為聲識等如子取父名名為依主父取子名即名依士所依劣故識如子根如父故眼識等名為依主識如父塵如子故色識等名為依士蓋主勝而士劣也餘可知言離合相者離謂眼者是根識者了別合謂此二合名眼識餘五離合準此應知餘五指下五釋皆有離合也餘可知一依主釋竟言持業者如説藏識識者是體藏是業用用能顯體體能持業藏即識故名為藏識故名持業離之則藏是能藏所藏執藏之義識是了別之義合之則識為體藏為用以用顯體體持于用故名持業也亦名同依釋藏取含藏用識取了別用此二同一所依故名同依也此以藏識二字俱約用釋而同依于第八心王之體故亦得名同依釋也二持業釋竟言有財者謂從所有以得其名一如佛陀此云覺者即有覺之者名為覺者此即分取他名離之則者字指人覺字指法合之則者字正指能有之人名之為自覺字乃指所有之財名之為他故為分取他名二如俱舍非對法藏對法藏者是本論名為依根本對法藏造故此亦名為對法藏論此全取他名亦名有財釋俱舍論是自對法藏是他依對法藏之他造于俱舍論之自即名俱舍論為對法藏論此俱舍論能有對法藏之財是全取他以彰名也三有財釋竟言相違者如説眼及耳等各別所詮皆自為主不相隨順故曰相違為有及與二言非前二釋義通帶數有財若直云眼耳則離之各詮一物合之互不相攝故名相違若言眼及耳等或言眼與耳等既有及字與字或借此以顯數即通帶數或以及與二字表於能有眼耳等字表於所有即通有財然決非前依主持業之二釋也四相違釋竟言帶數者以數顯義通於三釋如五蘊二諦等五即是蘊二即是諦此用自為名即持業帶數五二皆數也蘊以積聚為義諦以審實為義五皆積聚二皆審實故是持業帶數如眼等六識取自他為名即依主帶數識是能依之自眼等是所依之他六則是數故名依主帶數如説五逆為五無間無間是果即因談果此全取他名即有財帶數殺父等五逆罪乃是無間之因無間地獄劇苦乃是五逆之果今説五逆為五無間則是以果名因即因談果逆罪是能有之因為自無間是所有之財為他五則是數故名有財帶數五帶數釋竟言鄰近者從近為名如四念住以慧為體以慧近念故名念住此先舉例以明鄰近釋也四念住即四念處本是觀慧為體而念之與慧皆是別境心所相鄰近故名為念住故是鄰近釋也既是鄰近不同自為名無持業義通餘二釋以自為名乃有持業之義今既取鄰近為名故不可作持業釋但通依主有財二釋也一依主鄰近如有人近長安住有人問言為何處住答云長安住此人實非長安住以近長安故云長安住以分取他長安之名復是依主鄰近長安是所依之他住者是能依之自所依勝故名為依主而近於長安即名為長安住故是依主鄰近也二有財鄰近如問何處人答曰長安以全取他處以標人名即是有財以近長安復名鄰近人是能有正報長安是所有依報故是有財近長安即名為長安故是有財鄰近也六鄰近釋竟頌曰用自及用他自他用俱非通二通三種如是六種釋持業釋用自有財釋用他依主釋自他雙用相違釋自他俱非鄰近釋通於二種謂依主鄰近有財鄰近帶數釋通於三種謂依主帶數有財帶數持業帶數也寬文十二年壬子正月吉辰二條通二王門町長尾平兵衛雕梓
